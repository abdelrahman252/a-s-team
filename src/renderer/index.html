<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A's Team Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="styles/main.css">
<style>
/* ══════════════════════════════════════════
   DYNAMIC TEAM MANAGEMENT — EXTRA STYLES
══════════════════════════════════════════ */
.cfm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;animation:cfmIn .15s ease;}
@keyframes cfmIn{from{opacity:0}to{opacity:1}}
.cfm-box{background:#13151c;border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:30px 34px;width:440px;max-width:92vw;box-shadow:0 28px 90px rgba(0,0,0,.6);animation:cfmBoxIn .18s cubic-bezier(.34,1.3,.64,1);}
@keyframes cfmBoxIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.cfm-box h3{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;margin-bottom:8px;}
.cfm-box p{font-size:13px;color:#8b91b0;margin-bottom:26px;line-height:1.65;}
.cfm-actions{display:flex;gap:10px;justify-content:flex-end;}
.cfm-actions button{padding:9px 22px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:'DM Sans',sans-serif;}
.cbtn-cancel{background:rgba(255,255,255,.07);color:#f0f2ff;}
.cbtn-cancel:hover{opacity:.8}
.cbtn-danger{background:linear-gradient(135deg,#ff2d7a,#e0105a);color:#fff;}
.cbtn-danger:hover{opacity:.88}
.cbtn-ok{background:linear-gradient(135deg,#7b5cf0,#4f9ef8);color:#fff;}
.cbtn-ok:hover{opacity:.88}

.unsaved-dot{width:7px;height:7px;border-radius:50%;background:#f7931e;display:inline-block;flex-shrink:0;animation:pulse 1.5s infinite;}
.unsaved-badge{display:none;align-items:center;gap:6px;background:rgba(247,147,30,.1);border:1px solid rgba(247,147,30,.3);padding:5px 13px;border-radius:999px;font-size:11px;font-weight:700;color:#f7931e;}
.unsaved-badge.show{display:flex;}

.save-bar{position:sticky;bottom:0;background:linear-gradient(0deg,#0a0b0f 68%,transparent);padding:24px 0 0;margin-top:18px;}

.card-head-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.name-area{flex:1;min-width:0;}
.name-inp{background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,.12);color:#f0f2ff;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;padding:2px 4px;outline:none;width:100%;transition:border-color .2s;min-width:0;}
.name-inp:focus{border-bottom-color:#7b5cf0;}

.tiktok-list{display:flex;flex-direction:column;gap:7px;}
.tt-row{display:flex;align-items:center;gap:6px;}
.tt-row .inp{flex:1;}
.tt-num{font-size:10px;font-weight:700;color:#555a75;letter-spacing:.8px;text-transform:uppercase;min-width:36px;flex-shrink:0;}
.tt-del-btn{width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,45,122,.25);background:rgba(255,45,122,.08);color:#ff2d7a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s;}
.tt-del-btn:hover{background:rgba(255,45,122,.22);}
.add-tt-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:1px dashed rgba(0,212,255,.3);background:rgba(0,212,255,.05);color:#00d4ff;font-size:12px;font-weight:600;cursor:pointer;margin-top:5px;transition:background .15s;width:100%;font-family:'DM Sans',sans-serif;}
.add-tt-btn:hover{background:rgba(0,212,255,.12);}

.add-member-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:15px;border-radius:13px;border:2px dashed rgba(123,92,240,.35);background:rgba(123,92,240,.05);color:#a78bfa;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;transition:all .2s;font-family:'DM Sans',sans-serif;}
.add-member-btn:hover{background:rgba(123,92,240,.13);border-color:rgba(123,92,240,.65);}

.del-member-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;border:1px solid rgba(255,45,122,.2);background:rgba(255,45,122,.06);color:#ff2d7a;font-size:11px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0;}
.del-member-btn:hover{background:rgba(255,45,122,.2);}

.card-desc{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5;}
</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d7a"/>
      <stop offset="50%" stop-color="#7b5cf0"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
</svg>

<div id="splash">
  <div class="splash-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="splash-center">
    <div class="splash-ring-wrap">
      <svg class="splash-ring-track-svg" viewBox="0 0 120 120"><circle class="ring-track" cx="60" cy="60" r="54"/></svg>
      <div class="ring-rotate-wrap">
        <svg class="splash-ring-spin-svg" viewBox="0 0 120 120"><circle class="ring-spin" cx="60" cy="60" r="54"/></svg>
      </div>
      <div class="splash-logo-inner">A</div>
    </div>
    <div class="splash-title-wrap">
      <div class="splash-title">A's Team</div>
      <div class="splash-title-line"></div>
      <div class="splash-sub-title">Dashboard</div>
    </div>
    <div class="splash-bar-wrap">
      <div class="splash-bar-track"><div class="splash-bar-fill" id="splashBar"></div></div>
      <div class="splash-bar-label" id="splashLabel">Loading...</div>
    </div>
    <div class="splash-dots" id="splashDots">
      <div class="sdot" style="--c:#ff2d7a;--d:0s">AB</div>
    </div>
  </div>
</div>

<div class="shell" id="shell" style="display:none;"></div>

<!-- ── AUTO-UPDATE TOAST ── -->
<div id="updateToast" style="
  display:none;position:fixed;bottom:20px;right:20px;z-index:9999;
  background:#13141a;border:1px solid rgba(123,92,240,.45);border-radius:14px;
  padding:14px 18px;min-width:260px;max-width:320px;
  box-shadow:0 8px 32px rgba(0,0,0,.55);font-family:'DM Sans',sans-serif;
">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
    <div style="width:32px;height:32px;border-radius:8px;background:rgba(123,92,240,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </div>
    <div>
      <div id="updateTitle" style="font-weight:700;font-size:13px;color:#e8e8f0;">Update Available</div>
      <div id="updateSub"   style="font-size:11px;color:#6b7280;margin-top:1px;"></div>
    </div>
    <button onclick="document.getElementById('updateToast').style.display='none'" style="margin-left:auto;background:none;border:none;color:#6b7280;cursor:pointer;padding:2px;font-size:16px;line-height:1;">✕</button>
  </div>
  <!-- progress bar (hidden until download starts) -->
  <div id="updateProgressWrap" style="display:none;margin-bottom:10px;">
    <div style="background:rgba(255,255,255,.08);border-radius:99px;height:5px;overflow:hidden;">
      <div id="updateProgressBar" style="height:100%;width:0%;background:linear-gradient(90deg,#7b5cf0,#a78bfa);border-radius:99px;transition:width .3s;"></div>
    </div>
    <div id="updateProgressLabel" style="font-size:11px;color:#6b7280;margin-top:4px;text-align:right;">0%</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button id="updateActionBtn" onclick="handleUpdateAction()" style="
      flex:1;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;
      background:linear-gradient(135deg,#7b5cf0,#a78bfa);color:#fff;
      font-weight:700;font-size:12px;font-family:'DM Sans',sans-serif;
    ">Download Update</button>
  </div>
</div>
<div id="cfmMount"></div>

<script>
"use strict";
// ════════════════════════════════════════════════════════════════
//  TEAM STATE
// ════════════════════════════════════════════════════════════════
const COLOR_PALETTE=[
  {color:'#7b5cf0',grad:'linear-gradient(135deg,#7b5cf0,#4f9ef8)'},
  {color:'#00b4d8',grad:'linear-gradient(135deg,#00b4d8,#00d4a8)'},
  {color:'#f7931e',grad:'linear-gradient(135deg,#f7931e,#ffd700)'},
  {color:'#e040fb',grad:'linear-gradient(135deg,#e040fb,#ff6b9d)'},
  {color:'#22d36e',grad:'linear-gradient(135deg,#22d36e,#00d4ff)'},
  {color:'#4f9ef8',grad:'linear-gradient(135deg,#4f9ef8,#a78bfa)'},
  {color:'#fb7185',grad:'linear-gradient(135deg,#fb7185,#f7931e)'},
];
let MEMBERS=[];
let _unsaved=false;
let _uidCounter=Date.now();

function mkId(){return'mb_'+(++_uidCounter);}
function paletteFor(i){return COLOR_PALETTE[(i-1)%COLOR_PALETTE.length];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getInitials(n){const p=(n||'').trim().split(/\s+/);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():(n||'NM').slice(0,2).toUpperCase();}

function membersFromConfig(cfg){
  if(!cfg||!cfg.members||!cfg.members.length)return null;
  return cfg.members.map(m=>({
    id:m.id,name:m.name,color:m.color,grad:m.grad,
    initials:m.initials||getInitials(m.name),
    isPrimary:!!m.isPrimary,
    tiktokAccounts:(m.tiktokAccounts&&m.tiktokAccounts.length)?[...m.tiktokAccounts]:[''],
    khodEmail:m.khodEmail||'',khodPassword:m.khodPassword||'',
  }));
}
function defaultMembers(){
  return[{id:'abubakr',name:'Abubakr',color:'#ff2d7a',grad:'linear-gradient(135deg,#ff2d7a,#ff8c60)',initials:'AB',isPrimary:true,tiktokAccounts:['','',''],khodEmail:'',khodPassword:''}];
}

// ════════════════════════════════════════════════════════════════
//  MISC HELPERS
// ════════════════════════════════════════════════════════════════
const _today=new Date();
const todayIso=_today.toISOString().split('T')[0];
const todayStr=_today.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d} ${MON[+m-1]} ${y}`;}
function cpaInfo(v){if(v<=20.5)return{color:'#22d36e',label:'Good'};if(v<=22.5)return{color:'#f7931e',label:'Average'};return{color:'#ff2d7a',label:'High'};}
const USD_TO_SAR=3.75;
let currencyMode='SAR';
function fmtMoney(val,dec=2){const v=currencyMode==='USD'?(val||0)/USD_TO_SAR:(val||0);const s=currencyMode==='USD'?'$':'&#xFDFC;';return s+v.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function setCurrency(m){currencyMode=m;buildDashContent();}
function getMData(id){return dashData?.[id]||{spend:0,totalOrders:0,avgQtyTotal:0,cpa:0,deliveredOrders:0,avgQtyDelivered:0,sumTahseel:0,avgTahseel:0};}

let PAGE='splash',dashData=null,dashDate='',dashMemberIds=null,selMembers=new Set(),dateMode='today',curPerson=0,viewMode='single';

const IC={
  dash:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
  play:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
  gear:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  out:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
};

// ════════════════════════════════════════════════════════════════
//  CONFIRMATION MODAL
// ════════════════════════════════════════════════════════════════
function showConfirm({title,message,confirmLabel='Confirm',danger=false,onConfirm,onCancel}){
  const mount=document.getElementById('cfmMount');
  const btnCls=danger?'cbtn-danger':'cbtn-ok';
  mount.innerHTML=`<div class="cfm-overlay" id="cfmOverlay"><div class="cfm-box"><h3>${title}</h3><p>${message}</p><div class="cfm-actions"><button class="cbtn-cancel" id="cfmNo">Cancel</button><button class="${btnCls}" id="cfmYes">${confirmLabel}</button></div></div></div>`;
  document.getElementById('cfmNo').onclick=()=>{mount.innerHTML='';if(onCancel)onCancel();};
  document.getElementById('cfmYes').onclick=()=>{mount.innerHTML='';if(onConfirm)onConfirm();};
}

// ════════════════════════════════════════════════════════════════
//  ROUTER
// ════════════════════════════════════════════════════════════════
function navigate(page,params={}){
  if(PAGE==='running'){window.api.offBotLog();window.api.offBotProgress();}
  PAGE=page;
  const s=document.getElementById('shell');
  s.innerHTML=buildShell(page);
  if(page==='setup')    {buildSetupContent();}
  if(page==='execution'){buildExecContent();initExec();}
  if(page==='running')  {buildRunningContent();initRunning(params);}
  if(page==='dashboard'){if(params.data)dashData=params.data;buildDashContent();}
}

function buildShell(page){
  const titles={setup:'Team Setup',execution:'Execution Setup',running:'Bot Running...',dashboard:'Dashboard'};
  const subs={setup:'Configure team credentials',execution:'Select members and date range',running:'Please wait while the bot collects data',dashboard:`A's Team \u00b7 ${dashDate}`};
  return`<div class="sidebar">
    <div class="sb-logo">A</div>
    <div class="sb-icon${page==='dashboard'?' active':''}" title="Dashboard" onclick="if(dashData)navigate('dashboard',{data:dashData})">${IC.dash}</div>
    <div class="sb-icon${page==='execution'?' active':''}" title="Run Bot" onclick="navigate('execution')">${IC.play}</div>
    <div class="sb-divider"></div>
    <div class="sb-icon${page==='setup'?' active':''}" title="Settings" onclick="navigate('setup')">${IC.gear}</div>
    <div class="sb-bottom">
      <div class="sb-icon" id="sbUpdateBtn" title="Check for updates" onclick="checkForUpdatesManual()" style="position:relative;">${IC.out.replace('out','upd') || `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`}<span id="updateDot" style="display:none;position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:#a78bfa;box-shadow:0 0 6px #7b5cf0;"></span></div>
      <div class="sb-icon" title="Reset Data" onclick="doReset()">${IC.out}</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left"><h1>${titles[page]||page}</h1><p>${subs[page]||''}</p></div>
      <div class="topbar-right" id="topbarRight"></div>
    </div>
    <div class="page-scroll" id="pageContent"></div>
  </div>`;
}

async function doReset(){
  showConfirm({
    title:'Reset All Data?',
    message:'This will permanently delete all saved credentials and configuration. The app will return to default.',
    confirmLabel:'Reset Everything',
    danger:true,
    onConfirm:async()=>{
      await window.api.resetConfig();
      dashData=null;dashDate='';dashMemberIds=null;
      MEMBERS=defaultMembers();_unsaved=false;
      navigate('setup');
    }
  });
}

// ════════════════════════════════════════════════════════════════
//  SETUP PAGE
// ════════════════════════════════════════════════════════════════
function buildSetupContent(){_unsaved=false;renderSetupPage();}

function renderSetupPage(){
  const count=MEMBERS.length;
  document.getElementById('pageContent').innerHTML=`
    <div style="max-width:1080px;margin:28px auto 0;padding-bottom:140px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;">
        <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;">Team Members</div>
        <div id="memberCountBadge" style="background:var(--bg3);border:1px solid var(--border2);padding:5px 15px;border-radius:999px;font-size:12px;font-weight:600;color:var(--text2);">A's Team \u00b7 ${count} Member${count!==1?'s':''}</div>
        <div id="unsavedBadge" class="unsaved-badge${_unsaved?' show':''}"><span class="unsaved-dot"></span>Unsaved changes</div>
      </div>
      <div class="cards-grid" id="cardsGrid">${MEMBERS.map(buildCard).join('')}</div>
      <button class="add-member-btn" onclick="addMember()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Team Member
      </button>
      <div class="save-bar">
        <button class="btn btn-primary btn-full" id="saveBtn" onclick="saveConfig()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save Changes &amp; Continue
        </button>
        <div class="save-note">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22d36e" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          All credentials saved securely and encrypted on your device
        </div>
      </div>
    </div>`;
}

function buildCard(m){
  const ip=m.isPrimary;
  const avatar=ip
    ?`<div style="position:relative;width:44px;height:44px;flex-shrink:0;"><div style="position:absolute;inset:-2px;border-radius:50%;background:var(--grad);"></div><div class="avatar av-md" id="av-${m.id}" style="position:absolute;inset:2px;background:${m.grad};">${m.initials}</div></div>`
    :`<div class="avatar av-md" id="av-${m.id}" style="background:${m.grad};flex-shrink:0;">${m.initials}</div>`;
  const nameField=ip
    ?`<div class="pname">${esc(m.name)}</div>`
    :`<input class="name-inp" id="name-${m.id}" value="${esc(m.name)}" placeholder="Member name" oninput="onNameChange('${m.id}',this.value)" onblur="onNameBlur('${m.id}',this.value)">`;
  const delBtn=ip?'':`<button class="del-member-btn" onclick="confirmDelMember('${m.id}','${esc(m.name)}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>Remove</button>`;
  const ttRows=m.tiktokAccounts.map((acc,i)=>buildTTRow(m,acc,i)).join('');
  return`<div class="person-card${ip?' primary':''}" id="card-${m.id}">
    <div class="card-head-row">
      ${avatar}
      <div class="name-area">
        ${nameField}
        <div class="prole"><span class="dot-g"></span>${ip?'Primary Manager':'Team Member'}</div>
      </div>
      ${ip?'<div class="pm-badge">&#x1F451; MANAGER</div>':''}
      ${delBtn}
    </div>
    <div class="sec-head" id="ttsec-${m.id}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8l4 4-4 4"/></svg>TikTok Ad Account ID${m.tiktokAccounts.length>1?'s':''}</div>

function buildTTRow(m,acc,i){
  const multi=m.tiktokAccounts.length>1;

function markUnsaved(){

function toggleEye(btn){

function onNameChange(id,val){
  markUnsaved();
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  m.name=val||'New Member';m.initials=getInitials(m.name);
  const av=document.getElementById(`av-${id}`);if(av)av.textContent=m.initials;
}
function onNameBlur(id,val){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  if(!val.trim()){m.name='New Member';const el=document.getElementById(`name-${id}`);if(el)el.value=m.name;}
}

// ── TikTok Management ──
function addTT(id){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  snapshotCard(m);m.tiktokAccounts.push('');markUnsaved();refreshTTList(m);
}

function confirmRemoveTT(id,idx){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  if(m.tiktokAccounts.length<=1){
    showConfirm({title:'Cannot Remove Last Account',message:`<strong>${esc(m.name)}</strong> must keep at least one TikTok slot. You can leave it blank if unused.`,confirmLabel:'OK',danger:false});
    return;
  }
  showConfirm({
    title:'Remove TikTok Account?',
    message:`Remove <strong>Acc ${idx+1}</strong> for <strong>${esc(m.name)}</strong>? The stored URL will be deleted.`,
    confirmLabel:'Remove',danger:true,
    onConfirm:()=>{snapshotCard(m);m.tiktokAccounts.splice(idx,1);markUnsaved();refreshTTList(m);}
  });
}

function refreshTTList(m){
  const list=document.getElementById(`ttlist-${m.id}`);if(!list)return;
  list.innerHTML=m.tiktokAccounts.map((acc,i)=>buildTTRow(m,acc,i)).join('');
  const sec=document.getElementById(`ttsec-${m.id}`);
  if(sec)sec.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8l4 4-4 4"/></svg>TikTok Ad Account ID${m.tiktokAccounts.length>1?'s':''}`;
}

// ── Member Add / Delete ──
function addMember(){
  snapshotAllCards();
  const idx=MEMBERS.length;
  const pal=paletteFor(idx);
  const nm={id:mkId(),name:'New Member',color:pal.color,grad:pal.grad,initials:'NM',isPrimary:false,tiktokAccounts:[''],khodEmail:'',khodPassword:''};
  MEMBERS.push(nm);markUnsaved();rerenderCards();
  setTimeout(()=>{const el=document.getElementById(`name-${nm.id}`);if(el){el.focus();el.select();}},60);
}

function confirmDelMember(id,name){
  showConfirm({
    title:`Remove ${name}?`,
    message:`This will remove <strong>${esc(name)}</strong> and all their credentials (TikTok accounts + Khod login) from the team.<br><br>Changes only take effect after clicking <strong>Save Changes</strong>.`,
    confirmLabel:'Remove Member',danger:true,
    onConfirm:()=>{snapshotAllCards();MEMBERS=MEMBERS.filter(m=>m.id!==id);markUnsaved();rerenderCards();}

}

// ── Snapshot helpers ──
function snapshotCard(m){
  m.tiktokAccounts=m.tiktokAccounts.map((_,i)=>{const el=document.getElementById(`tt-${m.id}-${i}`);return el?el.value.trim():_;});
  const ee=document.getElementById(`email-${m.id}`),pe=document.getElementById(`pass-${m.id}`),ne=document.getElementById(`name-${m.id}`);
  if(ee)m.khodEmail=ee.value.trim();if(pe)m.khodPassword=pe.value.trim();
  if(ne){m.name=ne.value.trim()||'New Member';m.initials=getInitials(m.name);}
}
function snapshotAllCards(){MEMBERS.forEach(snapshotCard);}

function rerenderCards(){
  const count=MEMBERS.length;
  const badge=document.getElementById('memberCountBadge');
  if(badge)badge.textContent=`A's Team \u00b7 ${count} Member${count!==1?'s':''}`;
  const grid=document.getElementById('cardsGrid');
  if(grid)grid.innerHTML=MEMBERS.map(buildCard).join('');
}

async function saveConfig(){

  const payload={
    members:MEMBERS.map(m=>({
      id:m.id,name:m.name,color:m.color,grad:m.grad,initials:m.initials,

let _launchMinimized=false;
function _updateLaunchMinUI(){
  const btn=document.getElementById('exec-btn-launchmin'),knob=document.getElementById('exec-launchmin-knob'),lbl=document.getElementById('exec-launchmin-label');
  if(!btn)return;
  if(_launchMinimized){btn.style.background='var(--accent,#7b5cf0)';knob.style.transform='translateX(20px)';lbl.textContent='On';lbl.style.color='var(--accent,#7b5cf0)';}
  else{btn.style.background='var(--border,rgba(255,255,255,.1))';knob.style.transform='translateX(0)';lbl.textContent='Off';lbl.style.color='var(--text2,#888)';}
}
function initExec(){
  selMembers=new Set();dateMode='today';_lastExecState='';updateExecSum();
  window.api.getConfig().then(cfg=>{
    _launchMinimized=cfg?.launchMinimized||false;_updateLaunchMinUI();
    document.getElementById('exec-btn-launchmin')?.addEventListener('click',async()=>{_launchMinimized=!_launchMinimized;await window.api.setLaunchMinimized(_launchMinimized);_updateLaunchMinUI();});
  });
}

function toggleSel(id){
  const total=MEMBERS.length;
  if(id==='all'){
    const allSel=selMembers.size===total;selMembers.clear();
    document.getElementById('sel-all')?.classList.toggle('selected',!allSel);
    MEMBERS.forEach(m=>{document.getElementById(`sel-${m.id}`)?.classList.toggle('selected',!allSel);if(!allSel)selMembers.add(m.id);});
  }else{
    const el=document.getElementById(`sel-${id}`);
    if(selMembers.has(id)){selMembers.delete(id);el?.classList.remove('selected');}else{selMembers.add(id);el?.classList.add('selected');}
    document.getElementById('sel-all')?.classList.toggle('selected',selMembers.size===total);
  }
  _lastExecState='';updateExecSum();
}

function setDMode(mode){
  dateMode=mode;
  ['today','single','range'].forEach(m=>{
    document.getElementById(`dtab-${m}`)?.classList.toggle('active',m===mode);
    const d=document.getElementById(`dd-${m}`);if(d)d.style.display=m===mode?(mode==='today'?'flex':'block'):'none';
  });
  if(mode==='single'){
    const c=document.getElementById('cal-single');
    if(c&&!c.dataset.built){c.dataset.built='1';buildFastCal(c,_calSingle,todayIso,(v)=>{_calSingle=v;_lastExecState='';updateExecSum();});}
  }
  if(mode==='range'){
    const cf=document.getElementById('cal-from'),ct=document.getElementById('cal-to');
    if(cf&&!cf.dataset.built){cf.dataset.built='1';buildFastCal(cf,_calFrom,todayIso,(v)=>{_calFrom=v;_lastExecState='';updateExecSum();});}
    if(ct&&!ct.dataset.built){ct.dataset.built='1';buildFastCal(ct,_calTo,todayIso,(v)=>{_calTo=v;_lastExecState='';updateExecSum();});}
  }
  _lastExecState='';updateExecSum();
}

// Fast calendar state vars (set by buildCalendar callbacks)
let _calSingle=todayIso,_calFrom=todayIso,_calTo=todayIso;
function getDateVals(){
  if(dateMode==='today')return{from:todayIso,to:todayIso,label:todayStr,days:1};
  if(dateMode==='single'){const v=_calSingle;if(!v)return null;return{from:v,to:v,label:fmtDate(v),days:1};}
  const s=_calFrom,e=_calTo;
  if(!s||!e)return null;const diff=Math.round((new Date(e)-new Date(s))/86400000)+1;
  return diff>0?{from:s,to:e,label:`${fmtDate(s)} \u2192 ${fmtDate(e)}`,days:diff}:null;
}

let _lastExecState='';
function updateExecSum(){
  const n=selMembers.size;const dv=getDateVals();const key=`${n}|${dv?.label||''}`;
  if(key===_lastExecState)return;_lastExecState=key;
  document.getElementById('selCountSpan').textContent=`${n} user${n!==1?'s':''}`;
  document.getElementById('sumCount').textContent=n===0?'None selected':`${n} user${n!==1?'s':''}`;
  const av=document.getElementById('sumAvatars');
  if(av)av.innerHTML=MEMBERS.filter(m=>selMembers.has(m.id)).map(m=>`<div style="width:22px;height:22px;border-radius:50%;background:${m.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;border:2px solid var(--bg2);">${m.initials}</div>`).join('');
  document.getElementById('sumDate').textContent=dv?dv.label:'Not set';
  document.getElementById('sumDays').textContent=dv?.days?`${dv.days} day${dv.days!==1?'s':''}`:'\u2014';
  const rb=document.getElementById('runBtn');if(rb)rb.disabled=!(n>0&&dv&&dv.days>0);
}

async function startBot(){const dv=getDateVals();if(!dv||selMembers.size===0)return;navigate('running',{members:[...selMembers],dateFrom:dv.from,dateTo:dv.to,dateLabel:dv.label});}

        <div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;" id="runStatus">Bot is running...</div><div style="font-size:12px;color:var(--text3);margin-top:2px;" id="runPhase">Starting up...</div></div>
      </div>
      <button id="stopBtn" style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--pink);background:transparent;color:var(--pink);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;" onmouseenter="this.style.background='rgba(255,45,122,.12)'" onmouseleave="this.style.background='transparent'" onclick="handleStopBot()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>Stop</button>
    </div>
    <div style="font-size:11px;font-weight:600;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;">Live Log</div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;height:340px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;" id="logWrap"></div>
  </div>`;
}

async function handleStopBot(){
  const btn=document.getElementById('stopBtn');if(btn){btn.disabled=true;btn.textContent='Stopping...';}
  await window.api.stopBot();
  if(btn){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg> Waiting...';}
  const st=document.getElementById('runStatus');if(st){st.textContent='\u23F9 Stop requested \u2014 finishing current step...';st.style.color='var(--text2)';}
  const ph=document.getElementById('runPhase');if(ph){ph.textContent='The browser will close once the current action completes.';}
}

function initRunning(params){
  window.api.offBotLog();window.api.offBotProgress();
  const logWrap=document.getElementById('logWrap');
  let _buf=[],_raf=null;
  window.api.onBotLog(log=>{
    _buf.push(log);
    if(!_raf)_raf=requestAnimationFrame(()=>{
      _raf=null;const frag=document.createDocumentFragment();
      _buf.forEach(l=>{const d=document.createElement('div');d.style.color=l.type==='ok'?'#22d36e':l.type==='warn'?'#f7931e':l.type==='error'?'#ff2d7a':'#8b91b0';d.textContent=l.msg;frag.appendChild(d);});
      _buf=[];if(logWrap){logWrap.appendChild(frag);logWrap.scrollTop=logWrap.scrollHeight;}
    });
  });
  window.api.onBotProgress(p=>{const el=document.getElementById('runPhase');if(el&&p.memberName)el.textContent=`[${(p.memberIndex||0)+1}/${p.totalMembers||'?'}] ${p.memberName} \u2014 ${p.phase||''}`;});
  window.api.runBot({members:params.members,dateFrom:params.dateFrom,dateTo:params.dateTo}).then(res=>{
    window.api.offBotLog();window.api.offBotProgress();
    const st=document.getElementById('runStatus'),pulse=document.getElementById('runPulse'),btn=document.getElementById('stopBtn');
    if(pulse)pulse.style.animation='none';if(btn)btn.style.display='none';
    if(res.ok){dashData=res.result;dashDate=params.dateLabel||params.dateFrom;dashMemberIds=new Set(params.members||[]);curPerson=0;if(st){st.textContent='\u2705 Complete \u2014 loading dashboard...';st.style.color='var(--green)';}setTimeout(()=>navigate('dashboard',{data:dashData}),200);}
    else if(res.stopped){if(st){st.textContent='\u23F9 Bot stopped.';st.style.color='var(--text2)';}}
    else{if(st){st.textContent=`\u274C Error: ${res.error}`;st.style.color='var(--pink)';}}
  });
}

function buildFastCal(container, initial, maxDate, onChange){
  const parseLocal=(str)=>{const[y,m,d]=str.split('-').map(Number);return new Date(y,m-1,d);};
  const fmtIso=(date)=>`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const maxD=parseLocal(maxDate);
  let selected=parseLocal(initial);
  let viewYear=selected.getFullYear(),viewMonth=selected.getMonth();
  const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function render(){
    const selStr=fmtIso(selected),maxStr=fmtIso(maxD),todayS=fmtIso(new Date());
    const firstDay=new Date(viewYear,viewMonth,1),lastDay=new Date(viewYear,viewMonth+1,0);
    const startDow=firstDay.getDay(),totalDays=lastDay.getDate();
    const canNext=viewYear<maxD.getFullYear()||(viewYear===maxD.getFullYear()&&viewMonth<maxD.getMonth());
    const minYear=new Date().getFullYear()-5;
    const canPrev=viewYear>minYear||(viewYear===minYear&&viewMonth>0);
    let cells='';
    for(let i=0;i<startDow;i++)cells+=`<div class="fc-cell fc-empty"></div>`;
    for(let d=1;d<=totalDays;d++){
      const ds=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      let cls='fc-cell fc-day';
      if(ds===selStr)cls+=' fc-selected';
      else if(ds===todayS)cls+=' fc-today';
      if(ds>maxStr)cls+=' fc-disabled';
      cells+=`<div class="${cls}" data-date="${ds}">${d}</div>`;
    }
    container.innerHTML=`<div class="fc-wrap"><div class="fc-header"><button class="fc-nav" data-dir="-1"${canPrev?'':' disabled'}>&#8249;</button><span class="fc-month-label">${MONTHS[viewMonth]} ${viewYear}</span><button class="fc-nav" data-dir="1"${canNext?'':' disabled'}>&#8250;</button></div><div class="fc-grid">${DAYS.map(d=>`<div class="fc-cell fc-weekday">${d}</div>`).join('')}${cells}</div><div class="fc-selected-display">${selStr}</div></div>`;
    container.querySelector('.fc-grid').addEventListener('click',(e)=>{
      const cell=e.target.closest('.fc-day');
      if(!cell||cell.classList.contains('fc-disabled'))return;
      selected=parseLocal(cell.dataset.date);render();onChange(cell.dataset.date);
    });
    container.querySelectorAll('.fc-nav').forEach(btn=>{
      btn.addEventListener('click',()=>{
        viewMonth+=parseInt(btn.dataset.dir);
        if(viewMonth>11){viewMonth=0;viewYear++;}
        if(viewMonth<0){viewMonth=11;viewYear--;}
        render();
      });
    });
  }
  render();
}

window.addEventListener('DOMContentLoaded',async()=>{

  const loaded=membersFromConfig(cfg);

  if(dotsEl)dotsEl.innerHTML=MEMBERS.map((m,i)=>`<div class="sdot" style="--c:${m.color};--d:${i*0.08}s">${m.initials}</div>`).join('');

  const hasConfig=!!(cfg&&cfg.members&&cfg.members.length>0);

  if(bar){bar.style.transition='width .08s ease';bar.style.width='100%';}

  initAutoUpdater();
});

// ════════════════════════════════════════════════════════════════
//  AUTO-UPDATER UI
// ════════════════════════════════════════════════════════════════
let _updateState = 'idle'; // idle | available | downloading | downloaded

function showUpdateToast(title, sub, btnLabel, showProgress) {
  const toast = document.getElementById('updateToast');
  const dot   = document.getElementById('updateDot');
  document.getElementById('updateTitle').textContent = title;
  document.getElementById('updateSub').textContent   = sub;
  document.getElementById('updateActionBtn').textContent = btnLabel;
  document.getElementById('updateProgressWrap').style.display = showProgress ? 'block' : 'none';
  if(toast) toast.style.display = 'block';
  if(dot)   dot.style.display   = 'block';
}

function hideUpdateToast() {
  const t = document.getElementById('updateToast');
  if(t) t.style.display = 'none';
}

function handleUpdateAction() {
  if (_updateState === 'available') {
    _updateState = 'downloading';
    document.getElementById('updateActionBtn').textContent = 'Downloading...';
    document.getElementById('updateActionBtn').disabled = true;
    document.getElementById('updateProgressWrap').style.display = 'block';
    window.api.downloadUpdate();
  } else if (_updateState === 'downloaded') {
    window.api.installUpdate();
  }
}

function checkForUpdatesManual() {
  if (_updateState === 'available' || _updateState === 'downloaded') {
    document.getElementById('updateToast').style.display = 'block';
    return;
  }
  window.api.checkForUpdates().then(res => {
    if (res && res.dev) {
      document.getElementById('updateTitle').textContent = 'Dev Mode';
      document.getElementById('updateSub').textContent = 'Auto-update only works in packaged app.';
      document.getElementById('updateActionBtn').textContent = 'OK';
      document.getElementById('updateActionBtn').onclick = hideUpdateToast;
      document.getElementById('updateProgressWrap').style.display = 'none';
      document.getElementById('updateToast').style.display = 'block';
    }
  });
}

function initAutoUpdater() {
  if (!window.api || !window.api.onUpdateAvailable) return;

  window.api.onUpdateAvailable(({ version }) => {
    _updateState = 'available';
    document.getElementById('updateTitle').textContent = 'Update v' + version + ' Available';
    document.getElementById('updateSub').textContent   = 'A new version is ready to download.';
    document.getElementById('updateActionBtn').textContent = 'Download Update';
    document.getElementById('updateActionBtn').disabled = false;
    document.getElementById('updateActionBtn').onclick = handleUpdateAction;
    document.getElementById('updateProgressWrap').style.display = 'none';
    document.getElementById('updateToast').style.display = 'block';
    const dot = document.getElementById('updateDot');
    if(dot) dot.style.display = 'block';
  });

  window.api.onUpdateNotAvailable(() => {
    if (_updateState !== 'idle') {
      document.getElementById('updateTitle').textContent = "You're up to date";
      document.getElementById('updateSub').textContent = 'No new version found.';
      document.getElementById('updateActionBtn').textContent = 'OK';
      document.getElementById('updateActionBtn').onclick = hideUpdateToast;
      document.getElementById('updateProgressWrap').style.display = 'none';
      document.getElementById('updateToast').style.display = 'block';
    }
  });

  window.api.onUpdateProgress(({ percent }) => {
    const bar   = document.getElementById('updateProgressBar');
    const lbl   = document.getElementById('updateProgressLabel');
    if(bar) bar.style.width = percent + '%';
    if(lbl) lbl.textContent = percent + '%';
    document.getElementById('updateTitle').textContent = 'Downloading Update...';
    document.getElementById('updateSub').textContent   = percent + '% complete';
    document.getElementById('updateProgressWrap').style.display = 'block';
  });

  window.api.onUpdateDownloaded(() => {
    _updateState = 'downloaded';
    document.getElementById('updateProgressWrap').style.display = 'none';
    document.getElementById('updateTitle').textContent = 'Update Ready to Install';
    document.getElementById('updateSub').textContent   = 'Restart the app to apply the update.';
    document.getElementById('updateActionBtn').textContent = '\uD83D\uDE80 Restart & Install';
    document.getElementById('updateActionBtn').disabled = false;
    document.getElementById('updateActionBtn').onclick = handleUpdateAction;
    document.getElementById('updateToast').style.display = 'block';
  });

  window.api.onUpdateError(({ message }) => {
    _updateState = 'idle';
    hideUpdateToast();
    console.warn('Update error:', message);
  });
}
</script>

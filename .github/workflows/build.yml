name: Build & Release — Mac (arm64 + x64) & Windows

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:

  # ── arm64 first (your M3 Mac, most important) ──
  build-mac-arm64:
    name: Build macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - name: Build & publish arm64
        run: npx electron-builder --mac --arm64 --publish always
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: false
          EP_PRE_RELEASE: false

  # ── x64 in its own isolated job ──
  build-mac-x64:
    name: Build macOS x64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - name: Build & publish x64
        run: npx electron-builder --mac --x64 --publish always
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: false
          EP_PRE_RELEASE: false

  # ── Windows ──
  build-win:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - name: Build & publish Windows
        run: npx electron-builder --win --x64 --publish always
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: false
          EP_PRE_RELEASE: false

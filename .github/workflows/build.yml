name: Build — Mac & Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build DMG (x64)
        run: npx electron-builder --mac --x64
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_PUBLISH: never

      - name: Build DMG (arm64)
        run: npx electron-builder --mac --arm64
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_PUBLISH: never

      - name: Generate latest-mac.yml
        run: |
          node -e "
          const fs = require('fs');
          const crypto = require('crypto');
          const path = require('path');
          const version = require('./package.json').version;
          const distDir = './dist';
          const files = fs.readdirSync(distDir);
          const arm64zip = files.find(f => f.endsWith('-arm64-mac.zip'));
          const x64zip = files.find(f => f.endsWith('-mac.zip') && !f.includes('arm64'));
          function fileInfo(filename) {
            const buf = fs.readFileSync(path.join(distDir, filename));
            return { url: filename, sha512: crypto.createHash('sha512').update(buf).digest('base64'), size: buf.length };
          }
          const a = fileInfo(arm64zip);
          const x = fileInfo(x64zip);
          const yml = 'version: ' + version + '\nfiles:\n  - url: ' + a.url + '\n    sha512: ' + a.sha512 + '\n    size: ' + a.size + '\n  - url: ' + x.url + '\n    sha512: ' + x.sha512 + '\n    size: ' + x.size + '\npath: ' + a.url + '\nsha512: ' + a.sha512 + '\nreleaseDate: ' + new Date().toISOString();
          fs.writeFileSync(path.join(distDir, 'latest-mac.yml'), yml);
          console.log('Done:\n' + yml);
          "

      - name: Upload Mac artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml

  build-win:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build EXE and generate latest.yml
        run: npx electron-builder --win --publish never
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.yml manually
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $distDir = "dist"
          $setupExe = Get-ChildItem $distDir | Where-Object { $_.Name -match "setup.*\.exe$" -and $_.Name -notlike "*.blockmap" } | Select-Object -First 1
          Write-Host "Found: $($setupExe.Name)"
          $bytes = [System.IO.File]::ReadAllBytes($setupExe.FullName)
          $sha512 = [Convert]::ToBase64String([System.Security.Cryptography.SHA512]::Create().ComputeHash($bytes))
          $size = $setupExe.Length
          $yml = "version: $version`nfiles:`n  - url: $($setupExe.Name)`n    sha512: $sha512`n    size: $size`npath: $($setupExe.Name)`nsha512: $sha512`nreleaseDate: $(Get-Date -Format 'o')"
          $yml | Out-File -FilePath "$distDir/latest.yml" -Encoding utf8NoBOM
          Write-Host "Generated latest.yml:`n$yml"

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml

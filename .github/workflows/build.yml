name: Build — Mac & Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build and publish Mac (x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --publish always
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build and publish Windows
        run: npx electron-builder --win --publish always
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
